<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarketScope - Analizador de Trading</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header card">
      <div>
        <h1>📈 MarketScope</h1>
        <p>App para analizar el mercado de trading con indicadores técnicos y niveles clave.</p>
      </div>
      <button id="refreshBtn" class="button">Actualizar análisis</button>
    </header>

    <section class="controls card">
      <label>
        Activo
        <select id="symbolSelect">
          <option value="BTCUSDT">BTC/USDT</option>
          <option value="ETHUSDT">ETH/USDT</option>
          <option value="EURUSD">EUR/USD</option>
          <option value="AAPL">AAPL</option>
        </select>
      </label>

      <label>
        Marco temporal
        <select id="timeframeSelect">
          <option value="1H">1H</option>
          <option value="4H" selected>4H</option>
          <option value="1D">1D</option>
        </select>
      </label>

      <label>
        Velas
        <input id="periodInput" type="number" min="40" max="300" value="120" />
      </label>
    </section>

    <section class="chart card">
      <canvas id="priceCanvas" width="1100" height="360" aria-label="Gráfico de precio"></canvas>
      <div class="chart__legend">
        <span><i class="dot price"></i>Precio</span>
        <span><i class="dot ema"></i>EMA 21</span>
        <span><i class="dot sma"></i>SMA 50</span>
      </div>
    </section>

    <section class="grid">
      <article class="card stats">
        <h2>Resumen del mercado</h2>
        <ul id="marketSummary"></ul>
      </article>

      <article class="card signal">
        <h2>Señal sugerida</h2>
        <p id="signalText">Calculando...</p>
        <div class="pill-group">
          <span id="trendPill" class="pill">Tendencia</span>
          <span id="volatilityPill" class="pill">Volatilidad</span>
        </div>
      </article>

      <article class="card levels">
        <h2>Niveles clave</h2>
        <ul id="levelsList"></ul>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

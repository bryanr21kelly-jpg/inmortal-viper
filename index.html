<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        canvas {
            background: black;
            display: block;
            margin: auto;
        }

        #scoreboard {
            color: white;
            text-align: center;
            font-size: 2em;
        }
    </style>
</head>
<body>
    <div id="scoreboard">
        <span id="playerScore">0</span> : <span id="aiScore">0</span>
    </div>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        const paddleWidth = 10, paddleHeight = 100;
        const ballSize = 10;

        let player = {x: 0, y: canvas.height / 2 - paddleHeight / 2, score: 0};
        let ai = {x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, score: 0};
        let ball = {x: canvas.width / 2, y: canvas.height / 2, radius: ballSize, velocityX: 5, velocityY: 5};

        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawArc(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = 5 * (Math.random() > 0.5 ? 1 : -1);
            ball.velocityY = 5 * (Math.random() > 0.5 ? 1 : -1);
        }

        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Ball collision with paddles
            if (ball.x < player.x + paddleWidth &&
                ball.y > player.y &&
                ball.y < player.y + paddleHeight) {
                ball.velocityX = -ball.velocityX;
            }

            if (ball.x + ball.radius > ai.x &&
                ball.y > ai.y &&
                ball.y < ai.y + paddleHeight) {
                ball.velocityX = -ball.velocityX;
            }

            // Score Update
            if (ball.x - ball.radius < 0) {
                ai.score += 1;
                resetBall();
            }
            else if (ball.x + ball.radius > canvas.width) {
                player.score += 1;
                resetBall();
            }
        }

        function draw() {
            drawRect(0, 0, canvas.width, canvas.height, 'black');
            drawRect(player.x, player.y, paddleWidth, paddleHeight, 'white');
            drawRect(ai.x, ai.y, paddleWidth, paddleHeight, 'white');
            drawArc(ball.x, ball.y, ball.radius, 'white');
            document.getElementById('playerScore').innerText = player.score;
            document.getElementById('aiScore').innerText = ai.score;
        }

        function aiMovement() {
            let middlePaddle = ai.y + paddleHeight / 2;
            if (middlePaddle < ball.y) {
                ai.y += 4;
            } else {
                ai.y -= 4;
            }
        }

        function gameLoop() {
            update();
            aiMovement();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - paddleHeight / 2;
        });

        resetBall();
        gameLoop();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portales del Despertar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Portales del Despertar</h1>
      <p>
        RPG ligero de exploración de mazmorras, con vibra de cazadores, rangos y
        criaturas colosales.
      </p>
    </header>

    <section class="hud card">
      <div><strong>Nombre:</strong> <span id="name">Cazador Novato</span></div>
      <div><strong>Rango:</strong> <span id="rank">E</span></div>
      <div><strong>Nivel:</strong> <span id="level">1</span></div>
      <div><strong>Vida:</strong> <span id="hp">100</span></div>
      <div><strong>Energía:</strong> <span id="energy">50</span></div>
      <div><strong>Monedas:</strong> <span id="gold">0</span></div>
    </section>

    <section class="actions card">
      <button class="button" id="exploreBtn">Entrar al portal</button>
      <button class="button" id="fightBtn" disabled>Atacar</button>
      <button class="button" id="skillBtn" disabled>Habilidad especial</button>
      <button class="button" id="restBtn">Descansar</button>
      <button class="button" id="resetBtn">Reiniciar partida</button>
    </section>

    <section class="log card">
      <h2>Registro de incursión</h2>
      <ul id="log"></ul>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
